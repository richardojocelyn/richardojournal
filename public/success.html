<!DOCTYPE html>
<html>
<head>
    <title>Payment Success - Richardo Journal</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #38bdf8; }
        .license { font-size: 24px; color: #38bdf8; font-weight: bold; letter-spacing: 2px; margin: 20px 0; padding: 10px; border: 2px dashed #38bdf8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✅ PEMBAYARAN BERHASIL!</h1>
        <p>Thanks bro udah support Richardo Journal.</p>
        <p>Ini License Key lu, simpen baik-baik:</p>
        <div class="license" id="kode-lisensi">MEMUAT KODE...</div>
        <button onclick="window.location.href='/'" style="padding:10px; cursor:pointer;">Balik ke Web</button>
    </div>

    <script>
        // Ambil Order ID dari URL (Misal: ?order=RJ-1700...)
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');

        if (orderId) {
            // Potong ambil angkanya doang, terus racik jadi Kunci Lisensi
            const angkaOrder = orderId.replace('RJ-', '');
            // Hasilnya jadi misal: PRO-170054321-GACOR
            const kunciUnik = "PRO-" + angkaOrder + "-GACOR"; 
            
            document.getElementById('kode-lisensi').innerText = kunciUnik;
        } else {
            document.getElementById('kode-lisensi').innerText = "KODE TIDAK VALID";
            document.getElementById('kode-lisensi').style.color = "red";
        }
    </script>
</body>
</html>
