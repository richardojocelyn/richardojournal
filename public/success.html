<!DOCTYPE html>
<html>
<head>
    <title>Payment Success - Richardo Journal</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #38bdf8; }
        .license { font-size: 24px; color: #38bdf8; font-weight: bold; letter-spacing: 2px; margin: 20px 0; padding: 10px; border: 2px dashed #38bdf8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✅ PEMBAYARAN BERHASIL!</h1>
        <p>Thanks bro udah support Richardo Journal.</p>
        <p>Ini License Key lu, simpen baik-baik:</p>
        <div class="license" id="kode-lisensi">MEMUAT KODE...</div>
        <button onclick="window.location.href='/'" style="padding:10px; cursor:pointer;">Balik ke Web</button>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", async () => {
        // 1. Ambil order_id dari URL (?order=RJ-xxxxx)
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');

        const textElemen = document.getElementById("kode-lisensi");

        if (!orderId) {
            textElemen.innerText = "ORDER ID TIDAK VALID";
            return;
        }

        try {
            // 2. Minta Vercel ngecek statusnya
            const response = await fetch(`/api/status?order=${orderId}`);
            const data = await response.json();

            // 3. Tampilkan kodenya kalau berhasil
            if (response.ok && data.licenseKey) {
                textElemen.innerText = data.licenseKey;
                // Opsional: Bikin efek warna ijo biar estetik
                textElemen.style.color = "#4ade80"; 
            } else {
                textElemen.innerText = "MENUNGGU PEMBAYARAN...";
            }
        } catch (error) {
            textElemen.innerText = "ERROR KONEKSI SERVER";
        }
    });
</script>
</body>
</html>
